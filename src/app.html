<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Mark JS as available before first paint. Scroll-reveal sections start
		     hidden only when this class is present, so without JS (and for
		     crawlers) the prerendered content stays fully visible. -->
		<script>
			document.documentElement.classList.add('js')
		</script>
		<!-- Critical base theme, inlined so the first paint is already the dark
		     instrument theme. Without this the browser shows a white frame while
		     the external stylesheet downloads (a flash of unstyled content). The
		     full app.css overrides these with the gradient + custom properties. -->
		<style>
			html {
				color-scheme: dark;
				background-color: oklch(0.17 0.018 255);
				color: oklch(0.95 0.01 250);
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<noscript>
			<img src="https://shy.kohana.fi/ingress/bb7df59d-afc6-4bde-8b4f-cbbe5ce71577/pixel.gif" />
		</noscript>
		<script defer src="https://shy.kohana.fi/ingress/bb7df59d-afc6-4bde-8b4f-cbbe5ce71577/script.js"></script>
	</body>
</html>
